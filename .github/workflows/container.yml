name: Build and deploy Track the Hack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: track-the-hack-container-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          push: false
          tags: track-the-hack:test
          secret-files: env=.github/workflows/build.env
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: migration
          push: false
          tags: track-the-hack-migrate:test
          cache-from: type=gha

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to Azure Container Registry
        env:
          ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ vars.AZURE_ACR_LOGIN_SERVER }}/track-the-hack:${{ github.sha }}
          secret-files: env=.github/workflows/build.env
          cache-from: type=gha
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: migration
          push: true
          tags: ${{ vars.AZURE_ACR_LOGIN_SERVER }}/track-the-hack-migrate:${{ github.sha }}
          cache-from: type=gha
      - name: Run migration and deploy
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          SES_CONFIGURATION_SET: ${{ vars.SES_CONFIGURATION_SET }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Use built-in containerapp commands instead of the preview extension
          # which sends unsupported imageType in PUT bodies.
          az extension remove -n containerapp 2>/dev/null || true

          migration_image="${AZURE_ACR_LOGIN_SERVER}/track-the-hack-migrate:${GITHUB_SHA}"
          az containerapp job update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name track-the-hack-migrate \
            --image "$migration_image"
          execution="$(az containerapp job start \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name track-the-hack-migrate \
            --query name --output tsv)"
          for attempt in $(seq 1 60); do
            status="$(az containerapp job execution show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name track-the-hack-migrate \
              --job-execution-name "$execution" \
              --query properties.status --output tsv)"
            case "$status" in
              Succeeded) break ;;
              Failed) exit 1 ;;
            esac
            sleep 5
          done
          test "$status" = Succeeded
          test -n "$AWS_REGION"
          test -n "$SES_CONFIGURATION_SET"
          az containerapp update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name track-the-hack \
            --image "${AZURE_ACR_LOGIN_SERVER}/track-the-hack:${GITHUB_SHA}" \
            --set-env-vars "AWS_REGION=$AWS_REGION" "SES_CONFIGURATION_SET=$SES_CONFIGURATION_SET"
          ./infra/configure-health-probes.sh
